---
# =============================================================================
# Posit Connect — Group Variables
# =============================================================================

connect_license_file: "{{ posit_license_dir }}/connect.lic"

# Server address visible to users.
# Override if behind a load balancer or reverse proxy.
connect_server_address: "http://{{ ansible_host }}:3939"

# --- PPM Integration (auto-configured when PPM is deployed) ---
# Connect uses PPM for R and Python package repositories. Set automatically
# from posit_package_manager_url in all.yml when posit_deploy_package_manager
# is true. Override here to point at a different PPM instance.
connect_custom_config: "{{
  {
    'RPackageRepository \"CRAN\"': {
      'URL': posit_package_manager_url + '/cran/latest'
    },
    'RPackageRepository \"PPM\"': {
      'URL': posit_package_manager_url + '/all/latest'
    },
    'Python': {
      'PackageManager': posit_package_manager_url + '/pypi/latest/simple'
    }
  } if (posit_deploy_package_manager and posit_package_manager_url | length > 0) else {}
}}"

