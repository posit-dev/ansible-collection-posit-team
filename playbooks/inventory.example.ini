# =============================================================================
# Posit Team Inventory
# =============================================================================
#
# Define your hosts below. Each product needs its own group.
# A host can be in multiple groups (e.g., single-server deployment).
#
# Copy this file to inventory.ini and edit with your actual hosts.

# --- Single-server deployment (all products on one host) ---
# [package_manager]
# posit-server ansible_host=10.0.1.10
#
# [connect]
# posit-server ansible_host=10.0.1.10
#
# [workbench]
# posit-server ansible_host=10.0.1.10

# --- Multi-server deployment (one host per product) ---
[package_manager]
ppm-server ansible_host=10.0.1.10

[connect]
connect-server ansible_host=10.0.1.20

[workbench]
workbench-server ansible_host=10.0.1.30

# --- Parent group (do not edit) ---
[posit_servers:children]
package_manager
connect
workbench
