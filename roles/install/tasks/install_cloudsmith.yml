---
# Install a Posit product package from the Cloudsmith repository.
# Requires posit.tools.cloudsmith to have configured the repo first.

- name: Ensure Cloudsmith repository is configured
  ansible.builtin.include_role:
    name: posit.tools.cloudsmith

- name: Build package spec
  ansible.builtin.set_fact:
    _install_package_spec: >-
      {%- if install_version | length == 0 -%}
        {{ install_package_name }}
      {%- elif ansible_facts['os_family'] == 'RedHat' -%}
        {{ install_package_name }}-{{ install_version }}
      {%- else -%}
        {{ install_package_name }}={{ install_version }}*
      {%- endif -%}

- name: Install package (Debian)
  when: ansible_facts['os_family'] == 'Debian'
  become: true
  ansible.builtin.apt:
    name: "{{ _install_package_spec }}"
    state: present
    update_cache: true
    cache_valid_time: 3600
    allow_downgrade: true
    force_apt_get: true
  register: _install_apt_result
  retries: 3
  delay: 10
  until: _install_apt_result is success

- name: Install package (RedHat)
  when: ansible_facts['os_family'] == 'RedHat'
  become: true
  ansible.builtin.dnf:
    name: "{{ _install_package_spec }}"
    state: present
    update_cache: true
    allow_downgrade: true
  register: _install_dnf_result
  retries: 3
  delay: 10
  until: _install_dnf_result is success

- name: Install package (Suse)
  when: ansible_facts['os_family'] == 'Suse'
  become: true
  community.general.zypper:
    name: "{{ _install_package_spec }}"
    state: present
    update_cache: true
    disable_gpg_check: true
  register: _install_zypper_result
  retries: 3
  delay: 10
  until: _install_zypper_result is success

# --- Version Pinning ---
# Hold the package to prevent unintended upgrades via apt/dnf.

- name: Pin package version (Debian)
  when:
    - ansible_facts['os_family'] == 'Debian'
    - install_pin_version | bool
  become: true
  ansible.builtin.dpkg_selections:
    name: "{{ install_package_name }}"
    selection: hold

- name: Pin package version (RedHat)
  when:
    - ansible_facts['os_family'] == 'RedHat'
    - install_pin_version | bool
  become: true
  ansible.builtin.command:
    cmd: "dnf versionlock add {{ install_package_name }}"
  register: _dnf_versionlock
  changed_when: "'Added versionlock' in _dnf_versionlock.stdout"
  failed_when: false

- name: Pin package version (Suse)
  when:
    - ansible_facts['os_family'] == 'Suse'
    - install_pin_version | bool
  become: true
  ansible.builtin.command:
    cmd: "zypper addlock {{ install_package_name }}"
  register: _zypper_lock
  changed_when: "'already exists' not in _zypper_lock.stdout"
  failed_when: false
